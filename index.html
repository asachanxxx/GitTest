<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f0f0f0;
    }

    .card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 680px;
      width: 90%;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 1rem;
      border-radius: 50px;
      margin-bottom: 1.4rem;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2rem;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .feature {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.2rem 1rem;
      transition: transform 0.2s, background 0.2s;
    }

    .feature:hover {
      transform: translateY(-4px);
      background: rgba(255, 255, 255, 0.1);
    }

    .feature .icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .feature .label { font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.85); }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      border: none;
      background: linear-gradient(90deg, #6c63ff, #48cfad);
      color: #fff;
      box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.88; transform: scale(1.04); }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 100;
    }

    header .logo {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
    }

    header nav a {
      color: rgba(255, 255, 255, 0.65);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-left: 1.5rem;
      transition: color 0.2s;
    }

    header nav a:hover { color: #fff; }

    footer {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">&#9670; MyApp</span>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Docs</a>
      <a href="#">Contact</a>
    </nav>
  </header>
  <div class="card">
    <span class="badge">Hello World</span>
    <h1>Build Something Remarkable</h1>
    <p>
      Every great project starts with a single file. This is yours —
      a clean canvas ready for your ideas, designs, and code.
    </p>

    <div class="features">
      <div class="feature">
        <div class="icon">⚡</div>
        <div class="label">Fast</div>
      </div>
      <div class="feature">
        <div class="icon">🎨</div>
        <div class="label">Beautiful</div>
      </div>
      <div class="feature">
        <div class="icon">📱</div>
        <div class="label">Responsive</div>
      </div>
      <div class="feature">
        <div class="icon">🔒</div>
        <div class="label">Secure</div>
      </div>
    </div>

    <a class="btn" href="#">Get Started</a>

    <footer>Built with pure HTML &amp; CSS &middot; No dependencies</footer>
  </div>
</body>
</html>
